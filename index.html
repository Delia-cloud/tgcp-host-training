  <!-- Service Worker Registration & Airtable Data Layer -->
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js')
          .then(function(reg) { console.log('SW registered:', reg.scope); })
          .catch(function(err) { console.log('SW failed:', err); });
      });
    }

    // Data layer: loads from static data.json (no secrets in client code)
    // Form submissions go through /api/submit serverless function
    window.AirtableAPI = {
      _data: null,

      async loadData() {
        if (this._data) return this._data;
        try {
          var response = await fetch('/data.json');
          if (!response.ok) throw new Error('Failed to load data');
          this._data = await response.json();
        } catch (err) {
          console.warn('Could not load data.json:', err);
          this._data = {};
        }
        return this._data;
      },

      async fetchTable(tableName) {
        var data = await this.loadData();
        return data[tableName] || [];
      },

      async createRecord(tableName, fields) {
        var response = await fetch('/api/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ table: tableName, fields: fields })
        });
        if (!response.ok) throw new Error('Submit error: ' + response.status);
        return response.json();
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ============ AIRTABLE DATA HOOK ============
    function useAirtableData() {
      const [airtableModules, setAirtableModules] = useState(null);
      const [airtableConcepts, setAirtableConcepts] = useState(null);
      const [airtableScenarios, setAirtableScenarios] = useState(null);
      const [airtableQuizzes, setAirtableQuizzes] = useState(null);
      const [airtableTips, setAirtableTips] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      useEffect(() => {
        let cancelled = false;
        async function loadData() {
          try {
            const [modules, concepts, scenarios, quizzes, tips] = await Promise.all([
              AirtableAPI.fetchTable('modules', { sort: [{ field: 'Order', direction: 'asc' }] }),
              AirtableAPI.fetchTable('keyConcepts', { sort: [{ field: 'Module ID', direction: 'asc' }, { field: 'Order', direction: 'asc' }] }),
              AirtableAPI.fetchTable('conceptScenarios', { sort: [{ field: 'Module ID', direction: 'asc' }, { field: 'Order', direction: 'asc' }] }),
              AirtableAPI.fetchTable('quizQuestions', { sort: [{ field: 'Module ID', direction: 'asc' }] }).catch(() => null),
              AirtableAPI.fetchTable('practicalTips', { sort: [{ field: 'Module ID', direction: 'asc' }] }).catch(() => null)
            ]);
            if (cancelled) return;
            setAirtableModules(modules);
            setAirtableConcepts(concepts);
            setAirtableScenarios(scenarios);
            setAirtableQuizzes(quizzes);
            setAirtableTips(tips);
          } catch (err) {
            if (!cancelled) setError(err.message);
            console.warn('Airtable fetch failed, using local data:', err);
          } finally {
            if (!cancelled) setLoading(false);
          }
        }
        loadData();
        return () => { cancelled = true; };
      }, []);

      // Build enriched concepts grouped by module ID
      const conceptsByModule = React.useMemo(() => {
        if (!airtableConcepts) return null;
        const map = {};
        airtableConcepts.forEach(r => {
          const f = r.fields;
          const mid = f['Module ID'];
          if (!map[mid]) map[mid] = [];
          map[mid].push({
            title: f['Title'] || '',
            content: f['Content'] || '',
            source: 'airtable'
          });
        });
        return map;
      }, [airtableConcepts]);

      // Build scenarios grouped by module ID
      const scenariosByModule = React.useMemo(() => {
        if (!airtableScenarios) return null;
        const map = {};
        airtableScenarios.forEach(r => {
          const f = r.fields;
          const mid = f['Module ID'];
          if (!map[mid]) map[mid] = [];
          map[mid].push({
            conceptTitle: f['Concept Title'] || '',
            text: f['Scenario Text'] || '',
            source: 'airtable'
          });
        });
        return map;
      }, [airtableScenarios]);

      return { conceptsByModule, scenariosByModule, airtableModules, airtableQuizzes, airtableTips, loading, error };
    }

    // ============ PROGRESS PERSISTENCE ============
    function useProgress() {
      const STORAGE_KEY = 'tgcp_host_progress';
      const [quizStates, setQuizStates] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(quizStates));
        } catch {}
      }, [quizStates]);

      return [quizStates, setQuizStates];
    }

    // QUIZ DATA - All 10 modules with MCQ format
    const QUIZZES = {

          q: "You notice two Members sitting alone at different tables. Which micro-skill would help?",
          options: [

            "Prompting",

        {
          q: "Margaret keeps asking 'Where's my husband?' (who passed away). What should you do?",

    // ASK THE TRAINING - Search Component
    function AskTheTraining() {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [expandedResult, setExpandedResult] = useState(null);

      // Build searchable index from all app content
      const searchIndex = React.useMemo(() => {
        const items = [];

        // Index modules - key concepts and scenarios
        MODULES.forEach(mod => {
          mod.keyConcepts.forEach(kc => {
            const searchText = (kc.title + ' ' + kc.content + ' ' + (kc.scenarios || []).join(' ')).toLowerCase();
            items.push({
              type: 'module',
              moduleId: mod.id,
              moduleTitle: mod.title,
              title: kc.title,
              content: kc.content,
              detail: (kc.scenarios || []).join(' | '),
              searchText
            });
          });
          // Index takeaways
          const takeawayText = mod.takeaways.join('. ');
          items.push({
            type: 'module',
            moduleId: mod.id,
            moduleTitle: mod.title,
            title: mod.title + ' — Key Takeaways',
            content: takeawayText,
            detail: '',
            searchText: (mod.title + ' ' + mod.subtitle + ' ' + takeawayText).toLowerCase()
          });
        });

        // Index scenarios
        Object.entries(SCENARIOS).forEach(([modId, sc]) => {
          const mod = MODULES.find(m => m.id === parseInt(modId));
          const allChoiceText = sc.choices.map(c => c.label + ' ' + c.outcome + ' ' + c.reflection).join(' ');
          items.push({
            type: 'scenario',
            moduleId: parseInt(modId),
            moduleTitle: mod ? mod.title : '',
            title: sc.title,
            content: sc.situation,
            detail: sc.choices.find(c => c.quality === 'best')?.reflection || '',
            searchText: (sc.title + ' ' + sc.situation + ' ' + allChoiceText).toLowerCase()
          });
        });

        // Index quizzes - questions and explanations
        Object.entries(QUIZZES).forEach(([modId, questions]) => {
          const mod = MODULES.find(m => m.id === parseInt(modId));
          questions.forEach(q => {
            items.push({
              type: 'quiz',
              moduleId: parseInt(modId),
              moduleTitle: mod ? mod.title : '',
              title: q.q,
              content: q.explanation,
              detail: '',
              searchText: (q.q + ' ' + q.explanation + ' ' + q.options.join(' ')).toLowerCase()
            });
          });
        });

        return items;
      }, []);

      // Keyword map for common Host questions
      const synonyms = {
        'crying': ['upset', 'distress', 'tears', 'emotional', 'sad'],
        'upset': ['crying', 'distress', 'tears', 'emotional', 'sad', 'angry'],
        'new': ['first', 'arrival', 'welcome', 'joining', 'new face'],
        'quiet': ['silent', 'withdrawn', 'not talking', 'shy', 'alone'],
        'food': ['lunch', 'eating', 'meal', 'hungry', 'sandwich', 'soup'],
        'angry': ['aggressive', 'frustrated', 'cross', 'agitated'],
        'scared': ['anxious', 'nervous', 'worried', 'frightened', 'fear'],
        'leave': ['go home', 'want to leave', 'exit', 'departure', 'goodbye'],
        'touch': ['physical', 'hand', 'hug', 'PPA', 'approach'],
        'memory': ['forget', 'remember', 'dementia', 'confused', 'confusion'],
        'carer': ['family', 'daughter', 'son', 'husband', 'wife', 'relative'],
        'safeguarding': ['concern', 'abuse', 'neglect', 'safety', 'escalate', 'protect'],
        'activity': ['game', 'cards', 'music', 'painting', 'craft', 'exercise'],
        'boundary': ['boundaries', 'limit', 'personal', 'phone number', 'dependent'],
      };

      const handleSearch = (searchQuery) => {
        setQuery(searchQuery);
        setExpandedResult(null);

        if (searchQuery.trim().length < 2) {
          setResults([]);
          return;
        }

        const queryLower = searchQuery.toLowerCase().trim();
        const queryWords = queryLower.split(/\s+/);

        // Expand query with synonyms
        const expandedWords = new Set(queryWords);
        queryWords.forEach(word => {
          Object.entries(synonyms).forEach(([key, syns]) => {
            if (key.includes(word) || word.includes(key)) {
              syns.forEach(s => expandedWords.add(s));
              expandedWords.add(key);
            }
            if (syns.some(s => s.includes(word) || word.includes(s))) {
              expandedWords.add(key);
              syns.forEach(s => expandedWords.add(s));
            }
          });
        });

        const expandedArr = Array.from(expandedWords);

        // Score each item
        const scored = searchIndex.map(item => {
          let score = 0;
          // Exact phrase match (highest value)
          if (item.searchText.includes(queryLower)) score += 10;
          // Individual word matches
          expandedArr.forEach(word => {
            if (item.searchText.includes(word)) score += 2;
          });
          // Original query word matches score higher
          queryWords.forEach(word => {
            if (item.searchText.includes(word)) score += 3;
            if (item.title.toLowerCase().includes(word)) score += 5;
          });
          return { ...item, score };
        }).filter(item => item.score > 3)
          .sort((a, b) => b.score - a.score)
          .slice(0, 8);

        setResults(scored);
      };

      const typeLabels = { module: 'Module', scenario: 'Scenario', quiz: 'Quiz Insight' };
      const typeColors = { module: '#FF9E18', scenario: '#323E48', quiz: '#6B7280' };

      const exampleQueries = [
        'someone is upset',
        'new member arriving',
        'lunchtime',
        'boundaries',
        'quiet person',
        'dementia'
      ];

      return (
        <div className="bg-white rounded-xl shadow-md p-4 sm:p-8 mb-6">
          <h2 className="text-2xl sm:text-3xl font-bold mb-2" style={{ color: COLORS.slate }}>
            Ask the Training
          </h2>
          <p className="text-gray-600 mb-4 text-sm">Describe a situation or ask a question — we'll find the most relevant guidance.</p>

          {/* Search Input */}
          <div className="relative mb-4">
            <input
              type="text"
              value={query}
              onChange={(e) => handleSearch(e.target.value)}
              placeholder="e.g. 'someone is crying' or 'how to welcome a new member'..."
              className="w-full px-4 py-3 pr-10 rounded-xl border-2 text-sm sm:text-base focus:outline-none transition"
              style={{ borderColor: query ? COLORS.orange : '#e5e7eb', backgroundColor: '#FAFAFA' }}
            />
            {query && (
              <button
                onClick={() => { setQuery(''); setResults([]); }}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
              >
                <X size={18} />
              </button>
            )}
          </div>

          {/* Example Queries */}
          {!query && (
            <div className="flex flex-wrap gap-2 mb-2">
              <span className="text-xs text-gray-400">Try:</span>
              {exampleQueries.map(eq => (
                <button
                  key={eq}
                  onClick={() => handleSearch(eq)}
                  className="text-xs px-3 py-1 rounded-full border transition hover:shadow-sm"
                  style={{ borderColor: COLORS.orange, color: COLORS.orange }}
                >
                  {eq}
                </button>
              ))}
            </div>
          )}

          {/* Results */}
          {query && results.length === 0 && query.length >= 2 && (
            <div className="text-center py-6 text-gray-500 text-sm">
              <p>No matches found for "{query}".</p>
              <p className="mt-1">Try different words — for example, describe what's happening rather than asking a question.</p>
            </div>
          )}

          {results.length > 0 && (
            <div className="space-y-3 mt-4">
              <p className="text-xs text-gray-500 font-semibold">{results.length} result{results.length !== 1 ? 's' : ''} found</p>
              {results.map((r, idx) => (
                <div
                  key={idx}
                  className="rounded-xl border p-4 cursor-pointer transition hover:shadow-md"
                  style={{ borderColor: expandedResult === idx ? COLORS.orange : '#e5e7eb', backgroundColor: expandedResult === idx ? COLORS.cream : '#FAFAFA' }}
                  onClick={() => setExpandedResult(expandedResult === idx ? null : idx)}
                >
                  <div className="flex items-start gap-3">
                    <span
                      className="text-xs font-bold uppercase tracking-wide px-2 py-0.5 rounded-full flex-shrink-0 whitespace-nowrap mt-0.5"
                      style={{ backgroundColor: typeColors[r.type] + '20', color: typeColors[r.type] }}
                    >
                      {typeLabels[r.type]}
                    </span>
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm" style={{ color: COLORS.slate }}>{r.title}</p>
                      <p className="text-xs text-gray-500 mt-0.5">Module {r.moduleId}: {r.moduleTitle}</p>
                    </div>
                    <span className="text-gray-400 flex-shrink-0 mt-1">
                      {expandedResult === idx ? <ChevronUp size={16} /> : <ChevronDown size={16} />}
                    </span>
                  </div>
                  {expandedResult === idx && (
                    <div className="mt-3 pt-3 border-t text-sm text-gray-700 space-y-2" style={{ borderColor: '#e5e7eb' }}>
                      <p>{r.content}</p>
                      {r.detail && <p className="text-xs text-gray-500 italic">{r.detail}</p>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    // Quiz Module Component
    function QuizModule({ moduleId, onComplete, onCancel, onReviewModule }) {
      const quiz = QUIZZES[moduleId];
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [confidence, setConfidence] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [finished, setFinished] = useState(false);
      const [history, setHistory] = useState([]);

      const question = quiz[currentQuestion];
      const isCorrect = selectedOption === question.correct;

      const getFeedbackMessage = (correct, conf) => {
        if (correct && conf === 'certain') return 'Spot on — you clearly know this well.';
        if (correct && conf === 'fairly') return 'Good instinct — you were right to trust yourself.';
        if (correct && conf === 'guess') return 'Lucky guess! Worth revisiting so it sticks.';
        if (!correct && conf === 'guess') return 'Honest self-awareness — that\'s a great starting point for learning.';
        if (!correct && conf === 'fairly') return 'Close but not quite. A good area to revisit.';
        if (!correct && conf === 'certain') return 'This one caught you out. Worth reviewing carefully — confident misconceptions can slip into practice.';
      };

      const handleSelectOption = (idx) => {
        setSelectedOption(idx);
      };

      const handleSetConfidence = (level) => {
        setConfidence(level);
      };

      const handleNextQuestion = () => {
        const newHistory = [...history, { correct: isCorrect, confidence }];
        setHistory(newHistory);
        if (isCorrect) {
          setScore(score + 1);
        }
        if (currentQuestion < quiz.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedOption(null);
          setConfidence(null);

    // Scenario Progress Hook - persists branching scenario progress to localStorage
    function useScenarioProgress() {
      const STORAGE_KEY = 'tgcp_scenario_progress';
      const [progress, setProgressState] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      const setProgress = useCallback((updater) => {
        setProgressState(prev => {
          const next = typeof updater === 'function' ? updater(prev) : updater;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(next)); } catch {}
          return next;
        });
      }, []);

      return [progress, setProgress];
    }

    // Quality indicator colors and labels
    const QUALITY_CONFIG = {
      'best': { color: '#22c55e', bgColor: '#f0fdf4', borderColor: '#22c55e', label: 'Best Practice', icon: '★' },
      'good': { color: '#f59e0b', bgColor: '#fffbeb', borderColor: '#f59e0b', label: 'Good Approach', icon: '◆' },
      'less-ideal': { color: '#f97316', bgColor: '#fff7ed', borderColor: '#f97316', label: 'Less Ideal', icon: '●' }
    };

    // Branching Scenario Player Component
    function BranchingScenario({ moduleId, onBack, onComplete }) {
      const scenario = BRANCHING_SCENARIOS[moduleId];
      const [currentNodeId, setCurrentNodeId] = useState('start');
      const [path, setPath] = useState([]);
      const [selectedChoice, setSelectedChoice] = useState(null);
      const [showingOutcome, setShowingOutcome] = useState(false);
      const [isComplete, setIsComplete] = useState(false);
      const [fadeIn, setFadeIn] = useState(true);

      const currentNode = scenario ? scenario.nodes[currentNodeId] : null;

      const handleChoice = (choice, idx) => {
        setSelectedChoice(idx);
        setShowingOutcome(true);
        setPath(prev => [...prev, { nodeId: currentNodeId, choiceLabel: choice.label, quality: choice.quality, nextNode: choice.nextNode }]);
      };

      const handleContinue = () => {
        const lastChoice = path[path.length - 1];
        const nextNode = scenario.nodes[lastChoice.nextNode];

        if (nextNode.type === 'resolution') {
          setFadeIn(false);
          setTimeout(() => {
            setCurrentNodeId(lastChoice.nextNode);
            setSelectedChoice(null);
            setShowingOutcome(false);
            setIsComplete(true);
            setFadeIn(true);
          }, 200);
        } else {
          setFadeIn(false);
          setTimeout(() => {
            setCurrentNodeId(lastChoice.nextNode);
            setSelectedChoice(null);
            setShowingOutcome(false);
            setFadeIn(true);
          }, 200);
        }
      };

      if (!scenario) {
        return (
          <div style={{ backgroundColor: COLORS.cream, minHeight: '100vh' }} className="px-2 sm:px-6 py-4 sm:py-8">
            <div className="max-w-2xl mx-auto text-center">
              <p className="text-gray-700 mb-6">No branching scenario available for this module.</p>
              <button onClick={onBack} className="px-6 py-3 rounded-lg font-bold text-white" style={{ backgroundColor: COLORS.orange }}>Back</button>
            </div>
          </div>
        );
      }

      // Resolution / reflection summary screen
      if (isComplete) {
        return (
          <ScenarioReflection
            scenario={scenario}
            path={path}
            currentNode={scenario.nodes[currentNodeId]}
            moduleId={moduleId}
            onTryAgain={() => {
              setCurrentNodeId('start');
              setPath([]);
              setSelectedChoice(null);
              setShowingOutcome(false);
              setIsComplete(false);
            }}
            onBack={() => { if (onComplete) onComplete(path); onBack(); }}
          />
        );
      }

      // Progress indicator
      const stepNum = currentNode.type === 'situation' ? 1 : currentNode.type === 'outcome' ? 2 : 3;
      const stepLabels = ['Situation', 'Outcome', 'Follow-up'];

      return (
        <div style={{ backgroundColor: COLORS.cream, minHeight: '100vh' }} className="px-2 sm:px-6 pt-3 sm:pt-4 pb-16 sm:pb-8">
          <div className="max-w-3xl mx-auto">
            {/* Header */}
            <div className="mb-4">
              <button onClick={onBack} className="text-sm font-semibold mb-2 flex items-center gap-1" style={{ color: COLORS.orange }}>
                ← Back
              </button>
              <h2 className="text-2xl sm:text-3xl font-bold" style={{ color: COLORS.slate }}>
                {scenario.title}
              </h2>
              <p className="text-sm text-gray-500 mt-1">{scenario.moduleTitle} • Branching Scenario</p>
            </div>

            {/* Step progress dots */}
            <div className="flex items-center gap-2 mb-6">
              {stepLabels.map((label, i) => (
                <div key={i} className="flex items-center gap-2">
                  <div className="flex items-center gap-1">
                    <div
                      className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold"
                      style={{
                        backgroundColor: i + 1 <= stepNum ? COLORS.orange : '#e5e7eb',
                        color: i + 1 <= stepNum ? 'white' : '#9ca3af'
                      }}
                    >
                      {i + 1}
                    </div>
                    <span className="text-xs hidden sm:inline" style={{ color: i + 1 <= stepNum ? COLORS.slate : '#9ca3af' }}>
                      {label}
                    </span>
                  </div>
                  {i < stepLabels.length - 1 && (
                    <div className="w-6 sm:w-10 h-0.5" style={{ backgroundColor: i + 1 < stepNum ? COLORS.orange : '#e5e7eb' }}></div>
                  )}
                </div>
              ))}
            </div>

            {/* Main card */}
            <div
              className="bg-white rounded-xl shadow-lg p-4 sm:p-8"
              style={{ opacity: fadeIn ? 1 : 0, transition: 'opacity 0.2s ease' }}
            >
              {/* Situation / Outcome text */}
              {currentNode.type === 'situation' && (
                <div className="mb-6 p-5 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
                  <h3 className="font-bold mb-3 flex items-center gap-2" style={{ color: COLORS.slate }}>
                    <span className="text-lg">📖</span> The Situation
                  </h3>
                  <p className="text-gray-700 leading-relaxed">{currentNode.text}</p>
                </div>
              )}

              {currentNode.type === 'outcome' && (
                <div>
                  <div className={`mb-5 p-5 rounded-lg border-l-4`} style={{
                    backgroundColor: QUALITY_CONFIG[currentNode.quality].bgColor,
                    borderColor: QUALITY_CONFIG[currentNode.quality].borderColor
                  }}>
                    <p className="font-bold mb-2 text-sm" style={{ color: QUALITY_CONFIG[currentNode.quality].color }}>
                      {QUALITY_CONFIG[currentNode.quality].icon} {QUALITY_CONFIG[currentNode.quality].label}
                    </p>
                    <p className="text-gray-700 leading-relaxed">{currentNode.text}</p>
                  </div>
                  {currentNode.followUp && (
                    <div className="mb-6 p-5 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
                      <h3 className="font-bold mb-3 flex items-center gap-2" style={{ color: COLORS.slate }}>
                        <span className="text-lg">🔄</span> What happens next...
                      </h3>
                      <p className="text-gray-700 leading-relaxed">{currentNode.followUp}</p>
                    </div>
                  )}
                </div>
              )}

              {/* Choices */}
              {!showingOutcome && currentNode.choices && (
                <div>
                  <p className="font-semibold text-sm mb-3" style={{ color: COLORS.slate }}>What do you do?</p>
                  <div className="space-y-3">
                    {currentNode.choices.map((choice, idx) => (
                      <button
                        key={idx}
                        onClick={() => handleChoice(choice, idx)}
                        className="w-full p-4 text-left rounded-lg border-2 transition hover:shadow-md"
                        style={{ borderColor: '#e5e7eb', backgroundColor: 'white' }}
                        onMouseOver={e => { e.currentTarget.style.borderColor = COLORS.orange; }}
                        onMouseOut={e => { e.currentTarget.style.borderColor = '#e5e7eb'; }}
                      >
                        <p className="text-sm sm:text-base" style={{ color: COLORS.slate }}>{choice.label}</p>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* After selecting a choice - show what was chosen and continue button */}
              {showingOutcome && (
                <div>
                  <div className="p-4 rounded-lg border-2 mb-4" style={{ borderColor: COLORS.orange, backgroundColor: COLORS.cream }}>
                    <p className="text-xs font-semibold mb-1" style={{ color: COLORS.orange }}>Your choice:</p>
                    <p className="text-sm" style={{ color: COLORS.slate }}>{currentNode.choices[selectedChoice].label}</p>
                  </div>
                  <button
                    onClick={handleContinue}
                    className="w-full py-3 rounded-lg font-bold text-white transition"
                    style={{ backgroundColor: COLORS.orange }}
                  >
                    See what happens →
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Main App Component
    function HostTrainingApp() {
      const [currentTab, setCurrentTab] = useState('learn');
      const [expandedModule, setExpandedModule] = useState(null);
      const [quizStates, setQuizStates] = useProgress();
      const [showQuiz, setShowQuiz] = useState(null);
      const [showScenario, setShowScenario] = useState(null);
      const [showScenarioHub, setShowScenarioHub] = useState(null);
      const [showBranchingScenario, setShowBranchingScenario] = useState(null);
      const [scenarioProgress, setScenarioProgress] = useScenarioProgress();
      const { conceptsByModule, scenariosByModule, loading: airtableLoading, error: airtableError } = useAirtableData();

      const handleStartQuiz = (moduleId) => {
        setShowQuiz(moduleId);
      };

      const handleStartScenario = (moduleId) => {
        // Show the scenario hub (which lets user choose branching or flat)
        setShowScenarioHub(moduleId);
      };

      const handleStartBranching = (moduleId) => {
        setShowScenarioHub(null);
        setShowBranchingScenario(moduleId);
      };

      const handleStartFlat = (moduleId) => {
        setShowScenarioHub(null);
        setShowScenario(moduleId);
      };

      const handleBranchingComplete = (moduleId, path) => {
        const scenarioId = `bs${moduleId}`;
        setScenarioProgress(prev => ({
          ...prev,
          [scenarioId]: {
            completed: true,
            attempts: ((prev[scenarioId] || {}).attempts || 0) + 1,
            lastPlayed: Date.now(),
            lastPath: path.map(p => p.quality)
          }
        }));
      };

      const handleCompleteQuiz = (moduleId) => {
        setQuizStates(prev => ({
          ...prev,
          [moduleId]: { status: 'passed', completedAt: Date.now() }
        }));
        setShowQuiz(null);
      };

      const needsRefresh = (moduleId) => {
        const state = quizStates[moduleId];
        if (!state || state.status !== 'passed') return false;
        const daysSince = (Date.now() - state.completedAt) / (1000 * 60 * 60 * 24);
        return daysSince >= 14;
      };

      const handleCancelQuiz = () => {
        setShowQuiz(null);
      };

      const handleReviewModule = (moduleId) => {
        setShowQuiz(null);
        setCurrentTab('learn');
        setExpandedModule(moduleId);
      };

      const completedModules = Object.values(quizStates).filter(s => s && s.status === 'passed').length;
      const progressPercent = (completedModules / 10) * 100;

      const handleBackFromScenario = () => {
        const mid = showScenario;
        setShowScenario(null);
        setCurrentTab('learn');
        setExpandedModule(mid);
      };

      const handleBackFromHub = () => {
        const mid = showScenarioHub;
        setShowScenarioHub(null);
        setCurrentTab('learn');
        setExpandedModule(mid);
      };

      const handleBackFromBranching = () => {
        const mid = showBranchingScenario;
        setShowBranchingScenario(null);
        setCurrentTab('learn');
        setExpandedModule(mid);
      };

      // Branching scenario view
      if (showBranchingScenario) {
        return (
          <BranchingScenario
            moduleId={showBranchingScenario}
            onBack={handleBackFromBranching}
            onComplete={(path) => handleBranchingComplete(showBranchingScenario, path)}
          />
        );
      }

      // Scenario hub view
      if (showScenarioHub) {
        return (
          <ScenarioPracticeHub
            moduleId={showScenarioHub}
            onBack={handleBackFromHub}
            onStartBranching={handleStartBranching}
            onStartFlat={handleStartFlat}
            scenarioProgress={scenarioProgress}
          />
        );
      }

      // Flat scenario view (existing)
      if (showScenario) {
        return (
          <ScenarioPractice
            moduleId={showScenario}
            onBack={handleBackFromScenario}
          />
        );
      }

      if (showQuiz) {
        return (
          <QuizModule
            moduleId={showQuiz}
            onComplete={() => handleCompleteQuiz(showQuiz)}
            onCancel={handleCancelQuiz}
            onReviewModule={handleReviewModule}

                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Watch for people who hover but don't sit. Gently: "There's a lovely spot next to Margaret — she'd love the company."</span>
                        </div>
                      </div>
                    </div>

                    {/* During Activities */}
                    <div>
                      <h4 className="font-bold mb-1" style={{ color: COLORS.slate }}>During Activities</h4>
                      <p className="text-sm text-gray-500 mb-3">Activities are the vehicle, not the destination. Connection is what matters.</p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Offer choices gently: "We're playing cards over here, and there's painting on that table. Or just grab a tea and chat — all good."</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">If someone isn't joining in, don't push. Sit near them, match their energy, and let them come to the activity when they're ready.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">If an activity is falling flat, pivot. "Actually, let's do something different — tell me about your favourite holiday." Beautiful questions rescue flat moments.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Adapt, don't remove. If someone's hands shake during painting, get a thicker brush. If someone can't hear the quiz, sit next to them and repeat quietly.</span>
                        </div>
                      </div>
                    </div>

                    {/* Lunchtime */}
                    <div>
                      <h4 className="font-bold mb-1" style={{ color: COLORS.slate }}>Lunchtime</h4>
                      <p className="text-sm text-gray-500 mb-3">Food brings people together. Lunch is one of the most important moments for connection.</p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Keep food choices simple. "The soup is lovely today — shall I get you a bowl?" One clear option is kinder than five confusing ones.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">No one eats alone. Circulate and check: "Jim, come join us over here." Move chairs if needed to close gaps.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Use mealtimes to bridge people: "Margaret, have you met Arthur? He loves cricket too." Shared food and shared interests make friendships.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Notice if someone isn't eating. Don't ask "Why aren't you eating?" Instead: "Can I get you something different? The sandwiches are good today."</span>
                        </div>
                      </div>
                    </div>

                    {/* When Someone Is Upset */}
                    <div>
                      <h4 className="font-bold mb-1" style={{ color: COLORS.slate }}>When Someone Is Upset</h4>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Stop whatever is causing the distress immediately. Don't try to push through an activity that isn't working.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Never say "You're fine" or "Don't worry." Instead: "I can see you're upset. I'm here with you. Let's sit somewhere quieter."</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">If someone says "I want to go home," don't correct them. Go with their reality: "Tell me about home. What do you miss?"</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">After the moment passes, check in with yourself. Difficult interactions take energy. Have a tea, chat with a colleague. You did your best.</span>
                        </div>
                      </div>
                    </div>

                    {/* When Someone Is Quiet */}
                    <div>
                      <h4 className="font-bold mb-1" style={{ color: COLORS.slate }}>When Someone Is Quiet</h4>

                          <span className="text-sm text-gray-700">Sit beside them, not opposite. Side-by-side feels less confrontational. Just be present — you don't have to fill the silence.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Use a beautiful question after a moment: "What's been on your mind today?" No right or wrong answer, no pressure.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Don't invite them in front of everyone ("Come join us!"). Instead, quietly: "A few of us are playing cards — no pressure, but you're welcome."</span>
                        </div>
                      </div>
                    </div>

                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Make it personal: "It was lovely seeing you today, Margaret. That story about Scarborough was brilliant." Specific beats generic.</span>

                          <span className="text-sm text-gray-700">Give them something to look forward to: "We're doing music next week — I think you'll love it." Anticipation bridges the gap between sessions.</span>

                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Check in with carers at departure: "How was today for you? You know the Concierge is there if you need anything during the week."</span>

                      </div>
                    </div>
                  </div>

                          <span className="text-sm text-gray-700">Match your body to your words. A warm smile with a gentle voice says "safe." Rushing words with tense shoulders says "busy."</span>

                          <span className="text-sm text-gray-700">Keep a mental note of shared interests. "Arthur loves cricket, Frank was an engineer." These connections build friendships that outlast the session.</span>

                          <span className="text-sm text-gray-700">Compare to their baseline. "Margaret is usually chatty" is what makes "Margaret is quiet today" meaningful. Know your Members.</span>

                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">After Club, share what you noticed in the debrief. "The energy dipped after lunch" or "The music really lifted everyone" — these observations shape next week.</span>

                      </div>

                  </div>
                </div>

                      <li>✓ Shows up consistently</li>

                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>

                    <div className="grid gap-4 md:grid-cols-2">
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Person-Centred</p>

                      </div>
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Relational</p>
                        <p className="text-sm text-gray-600 mt-1">Presence matters more than perfection.</p>
                      </div>
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Inclusive</p>
                        <p className="text-sm text-gray-600 mt-1">Everyone belongs. No one eats alone.</p>
                      </div>
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Strengths-Based</p>
                        <p className="text-sm text-gray-600 mt-1">Focus on what people can do, not what they can't.</p>
                      </div>
                    </div>
                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      The Thursday Murder Club Principle
                    </h3>
                    <p className="text-gray-700 italic mb-3">
                      "It's not about the activities. It's about the people. And the people are everything."
                    </p>
                    <p className="text-gray-700">
                      Members come for activities, puzzles, and outings. But they stay for the friendships, the laughter, and the feeling of belonging to something that matters. As a Host, you create that belonging.
                    </p>
                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      What the Training Covers
                    </h3>
                    <p className="text-gray-700 mb-4">
                      Our one-day training programme covers 10 modules, each designed to build your confidence as a Host:
                    </p>
                    <div className="grid gap-2">
                      {MODULES.map(m => (
                        <div key={m.id} className="flex items-start gap-3 p-3 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
                          <span className="font-bold text-sm mt-0.5" style={{ color: COLORS.orange }}>{m.id}</span>
                          <div>
                            <p className="font-semibold text-sm" style={{ color: COLORS.slate }}>{m.title}</p>
                            <p className="text-xs text-gray-500">{m.subtitle}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <ExpressInterestForm />
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-white border-t-2 mt-8 sm:mt-12" style={{ borderColor: COLORS.orange }}>
            <div className="max-w-6xl mx-auto px-2 sm:px-4 py-6 sm:py-8 text-center text-gray-600 text-sm space-y-3">

              <div className="flex items-center justify-center gap-2 text-xs">
                <span className={`w-2 h-2 rounded-full ${airtableError ? 'bg-red-400' : airtableLoading ? 'bg-yellow-400' : 'bg-green-400'}`}></span>

              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
