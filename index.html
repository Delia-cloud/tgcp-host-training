    // Express Interest Form Component
    function ExpressInterestForm() {
      const [formData, setFormData] = useState({
        name: '',
        email: '',
        phone: '',
        message: ''
      });
      const [submitted, setSubmitted] = useState(false);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({
          ...prev,
          [name]: value
        }));
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setSubmitted(true);
        setTimeout(() => setSubmitted(false), 3000);
      };

      return (
        <div className="p-4 sm:p-8 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
          <h3 className="text-lg sm:text-xl font-bold mb-4" style={{ color: COLORS.slate }}>
            Interested in Becoming a Host?
          </h3>
          <p className="text-gray-700 mb-6">
            If you'd like to join our Host team or learn more about The Good Company People, we'd love to hear from you.
          </p>
          {submitted ? (
            <div className="p-4 rounded-lg bg-green-100 text-green-800">
              <p className="font-semibold">Thank you for your interest!</p>
              <p className="text-sm mt-2">We'll be in touch soon with more information.</p>
            </div>
          ) : (
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-semibold mb-2" style={{ color: COLORS.slate }}>
                  Name
                </label>
                <input
                  type="text"
                  name="name"
                  value={formData.name}
                  onChange={handleChange}
                  required
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-400"
                />
              </div>
              <div>
                <label className="block text-sm font-semibold mb-2" style={{ color: COLORS.slate }}>
                  Email
                </label>
                <input
                  type="email"
                  name="email"
                  value={formData.email}
                  onChange={handleChange}
                  required
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-400"
                />
              </div>
              <div>
                <label className="block text-sm font-semibold mb-2" style={{ color: COLORS.slate }}>
                  Phone
                </label>
                <input
                  type="tel"
                  name="phone"
                  value={formData.phone}
                  onChange={handleChange}
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-400"
                />
              </div>
              <div>
                <label className="block text-sm font-semibold mb-2" style={{ color: COLORS.slate }}>
                  Message (optional)
                </label>
                <textarea
                  name="message"
                  value={formData.message}
                  onChange={handleChange}
                  rows="4"
                  className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-orange-400"
                ></textarea>
              </div>
              <button
                type="submit"
                className="w-full px-6 py-3 rounded-lg font-bold text-white transition flex items-center justify-center gap-2"
                style={{ backgroundColor: COLORS.orange }}
              >
                <Send size={18} />
                Send
              </button>
            </form>
          )}
        </div>
      );
    }

    // Quiz Module Component
    function QuizModule({ moduleId, onComplete, onCancel, onReviewModule }) {
      const quiz = QUIZZES[moduleId];
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [confidence, setConfidence] = useState(null);
      const [answered, setAnswered] = useState(false);
      const [score, setScore] = useState(0);
      const [finished, setFinished] = useState(false);
      const [history, setHistory] = useState([]);

      const question = quiz[currentQuestion];
      const isCorrect = selectedOption === question.correct;

      const getFeedbackMessage = (correct, conf) => {
        if (correct && conf === 'certain') return 'Spot on — you clearly know this well.';
        if (correct && conf === 'fairly') return 'Good instinct — you were right to trust yourself.';
        if (correct && conf === 'guess') return 'Lucky guess! Worth revisiting so it sticks.';
        if (!correct && conf === 'guess') return 'Honest self-awareness — that\'s a great starting point for learning.';
        if (!correct && conf === 'fairly') return 'Close but not quite. A good area to revisit.';
        if (!correct && conf === 'certain') return 'This one caught you out. Worth reviewing carefully — confident misconceptions can slip into practice.';
      };

      const handleSelectOption = (idx) => {
        setSelectedOption(idx);
      };

      const handleSetConfidence = (level) => {
        setConfidence(level);
      };

      const handleNextQuestion = () => {
        const newHistory = [...history, { correct: isCorrect, confidence }];
        setHistory(newHistory);
        if (isCorrect) {
          setScore(score + 1);
        }
        if (currentQuestion < quiz.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
          setSelectedOption(null);
          setConfidence(null);
          setAnswered(false);
        } else {
          setFinished(true);
        }
      };

      const handleSubmitAnswer = () => {
        setAnswered(true);
      };

      if (finished) {
        const passedQuiz = score >= 3;
        return (
          <div style={{ backgroundColor: COLORS.cream, minHeight: '100vh', padding: '2rem' }}>
            <div className="max-w-2xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-4 sm:p-8 text-center">
                <div className="text-5xl mb-4">
                  {passedQuiz ? '🎉' : '📚'}
                </div>
                <h2 className="text-3xl font-bold mb-4" style={{ color: COLORS.slate }}>
                  {passedQuiz ? 'Module Complete!' : 'Great Effort!'}
                </h2>
                <p className="text-2xl font-bold mb-2" style={{ color: COLORS.orange }}>
                  Your Score: {score}/4 ({Math.round((score/4)*100)}%)
                </p>
                {passedQuiz && (
                  <p className="text-green-600 font-semibold mb-6">
                    You've passed this module! You can retake it anytime to refresh.
                  </p>
                )}
                {!passedQuiz && (
                  <div className="mb-6 p-4 rounded-lg bg-blue-100 text-blue-800">
                    <p className="font-semibold">You need 3/4 correct to pass</p>
                    <p className="text-sm mt-2">Try again — each attempt helps it stick!</p>
                  </div>
                )}
                <div className="flex gap-4 justify-center">
                  <button
                    onClick={() => onReviewModule(moduleId)}
                    className="px-6 py-3 rounded-lg font-bold text-white transition"
                    style={{ backgroundColor: COLORS.orange }}
                  >
                    Review Module
                  </button>
                  <button
                    onClick={onCancel}
                    className="px-6 py-3 rounded-lg font-bold border-2 transition"
                    style={{ borderColor: COLORS.orange, color: COLORS.orange }}
                  >
                    Back to Learning
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ backgroundColor: COLORS.cream, minHeight: '100vh', padding: '2rem' }}>
          <div className="max-w-2xl mx-auto">
            <div className="bg-white rounded-xl shadow-lg p-4 sm:p-8">
              {/* Progress */}
              <div className="mb-6">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-sm font-semibold" style={{ color: COLORS.slate }}>
                    Question {currentQuestion + 1} of {quiz.length}
                  </span>
                  <span className="text-sm font-semibold" style={{ color: COLORS.orange }}>
                    Score: {score}/{currentQuestion}
                  </span>
                </div>
                <div className="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                  <div
                    className="h-full transition-all"
                    style={{
                      backgroundColor: COLORS.orange,
                      width: `${((currentQuestion + 1) / quiz.length) * 100}%`
                    }}
                  />
                </div>
              </div>

              {/* Question */}
              <h3 className="text-xl font-bold mb-6" style={{ color: COLORS.slate }}>
                {question.q}
              </h3>

              {/* Options */}
              <div className="space-y-3 mb-8">
                {question.options.map((option, idx) => (
                  <button
                    key={idx}
                    onClick={() => handleSelectOption(idx)}
                    className={`w-full p-4 text-left rounded-lg border-2 transition ${
                      selectedOption === idx
                        ? 'border-orange-400'
                        : 'border-gray-200 hover:border-gray-300'
                    }`}
                    style={{
                      backgroundColor: selectedOption === idx ? COLORS.cream : 'white'
                    }}
                  >
                    <div className="flex items-start gap-3">
                      <div
                        className="w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center mt-0.5"
                        style={{
                          borderColor: selectedOption === idx ? COLORS.orange : '#ccc'
                        }}
                      >
                        {selectedOption === idx && (
                          <div
                            className="w-3 h-3 rounded-full"
                            style={{ backgroundColor: COLORS.orange }}
                          />
                        )}
                      </div>
                      <span className="text-gray-700">{option}</span>
                    </div>
                  </button>
                ))}
              </div>

              {/* Confidence selector (before answering) */}
              {!answered && selectedOption !== null && (
                <div className="mb-8 p-4 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
                  <p className="text-sm font-semibold mb-3" style={{ color: COLORS.slate }}>
                    How confident are you?
                  </p>
                  <div className="flex gap-2 sm:gap-3">
                    {[
                      { label: 'Guessing', value: 'guess' },
                      { label: 'Fairly Sure', value: 'fairly' },
                      { label: 'Certain', value: 'certain' }
                    ].map(c => (
                      <button
                        key={c.value}
                        onClick={() => handleSetConfidence(c.value)}
                        className={`flex-1 px-2 sm:px-4 py-2 rounded-lg font-semibold transition text-xs sm:text-sm ${
                          confidence === c.value ? 'text-white' : 'text-gray-700 bg-white border border-gray-300'
                        }`}
                        style={{
                          backgroundColor: confidence === c.value ? COLORS.orange : undefined
                        }}
                      >
                        {c.label}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* Feedback (after answering) */}
              {answered && (
                <div className={`mb-8 p-6 rounded-lg border-l-4 ${
                  isCorrect ? 'bg-green-50 border-green-400' : 'bg-red-50 border-red-400'
                }`}>
                  <p className={`font-bold mb-3 ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>
                    {isCorrect ? 'Correct!' : 'Not quite.'}
                  </p>
                  <p className="text-gray-700 mb-3">
                    {getFeedbackMessage(isCorrect, confidence)}
                  </p>
                  <p className="text-sm text-gray-600 bg-white p-3 rounded">
                    {question.explanation}
                  </p>
                </div>
              )}

              {/* Buttons */}
              <div className="flex gap-4">
                {!answered && selectedOption !== null && confidence !== null && (
                  <button
                    onClick={handleSubmitAnswer}
                    className="flex-1 px-6 py-3 rounded-lg font-bold text-white transition"
                    style={{ backgroundColor: COLORS.orange }}
                  >
                    Submit Answer
                  </button>
                )}
                {answered && (
                  <button
                    onClick={handleNextQuestion}
                    className="flex-1 px-6 py-3 rounded-lg font-bold text-white transition"
                    style={{ backgroundColor: COLORS.orange }}
                  >
                    {currentQuestion === quiz.length - 1 ? 'See Results' : 'Next Question'}
                  </button>
                )}
                <button
                  onClick={onCancel}
                  className="px-6 py-3 rounded-lg font-bold border-2 transition"
                  style={{ borderColor: COLORS.orange, color: COLORS.orange }}
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Scenario Practice Component
    function ScenarioPractice({ moduleId, onBack }) {
      const scenario = SCENARIOS[moduleId];
      const [selectedChoice, setSelectedChoice] = useState(null);
      const [showOutcome, setShowOutcome] = useState(false);

      if (!scenario) {
        return (
          <div style={{ backgroundColor: COLORS.cream, minHeight: '100vh', padding: '2rem' }}>
            <div className="max-w-2xl mx-auto">
              <div className="bg-white rounded-xl shadow-lg p-4 sm:p-8 text-center">
                <p className="text-gray-700 mb-6">No scenario available for this module.</p>
                <button
                  onClick={onBack}
                  className="px-6 py-3 rounded-lg font-bold text-white transition"
                  style={{ backgroundColor: COLORS.orange }}
                >
                  Back
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{ backgroundColor: COLORS.cream, minHeight: '100vh', padding: '2rem' }}>
          <div className="max-w-3xl mx-auto">
            <div className="bg-white rounded-xl shadow-lg p-4 sm:p-8">
              <h2 className="text-3xl font-bold mb-2" style={{ color: COLORS.slate }}>
                {scenario.title}
              </h2>
              <p className="text-gray-600 mb-8">Module {moduleId} • Scenario Practice</p>

              {/* Situation */}
              <div className="mb-8 p-6 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
                <h3 className="font-bold mb-3" style={{ color: COLORS.slate }}>
                  The Situation
                </h3>
                <p className="text-gray-700 leading-relaxed">
                  {scenario.situation}
                </p>
              </div>

              {/* Choices */}
              <div className="space-y-4 mb-8">
                {scenario.choices.map((choice, idx) => (
                  <div key={idx}>
                    <button
                      onClick={() => {
                        setSelectedChoice(idx);
                        setShowOutcome(true);
                      }}
                      className={`w-full p-4 text-left rounded-lg border-2 transition ${
                        selectedChoice === idx
                          ? 'border-orange-400'
                          : 'border-gray-200 hover:border-gray-300'
                      }`}
                      style={{
                        backgroundColor: selectedChoice === idx ? COLORS.cream : 'white'
                      }}
                    >
                      <p className="font-semibold" style={{ color: COLORS.slate }}>
                        {choice.label}
                      </p>
                    </button>

                    {/* Outcome */}
                    {showOutcome && selectedChoice === idx && (
                      <div className={`mt-3 p-6 rounded-lg border-l-4 ${
                        choice.quality === 'best'
                          ? 'bg-green-50 border-green-400'
                          : 'bg-amber-50 border-amber-400'
                      }`}>
                        <p className={`font-bold mb-3 ${
                          choice.quality === 'best' ? 'text-green-800' : 'text-amber-800'
                        }`}>
                          {choice.quality === 'best' ? 'Best Choice' : 'Less Ideal'}
                        </p>
                        <p className="text-gray-700 mb-4">
                          {choice.outcome}
                        </p>
                        <div className="bg-white p-3 rounded text-sm text-gray-600 border-l-2 border-gray-300">
                          <p className="font-semibold mb-1">Reflection:</p>
                          {choice.reflection}
                        </div>
                      </div>
                    )}
                  </div>

                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">After the moment passes, check in with yourself. Difficult interactions take energy. Have a tea, chat with a colleague. You did your best.</span>
                        </div>
                      </div>
                    </div>

                    {/* When Someone Is Quiet */}
                    <div>
                      <h4 className="font-bold mb-1" style={{ color: COLORS.slate }}>When Someone Is Quiet</h4>
                      <p className="text-sm text-gray-500 mb-3">Quiet isn't always a problem. Sometimes people need space. But they should never feel invisible.</p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Sit beside them, not opposite. Side-by-side feels less confrontational. Just be present — you don't have to fill the silence.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Use a beautiful question after a moment: "What's been on your mind today?" No right or wrong answer, no pressure.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Don't invite them in front of everyone ("Come join us!"). Instead, quietly: "A few of us are playing cards — no pressure, but you're welcome."</span>
                        </div>
                      </div>
                    </div>

                    {/* Saying Goodbye */}
                    <div>
                      <h4 className="font-bold mb-1" style={{ color: COLORS.slate }}>Saying Goodbye</h4>
                      <p className="text-sm text-gray-500 mb-3">How you end matters as much as how you begin. A warm goodbye gives people something to carry home.</p>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Make it personal: "It was lovely seeing you today, Margaret. That story about Scarborough was brilliant." Specific beats generic.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Give them something to look forward to: "We're doing music next week — I think you'll love it." Anticipation bridges the gap between sessions.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Try this</span>
                          <span className="text-sm text-gray-700">Check in with carers at departure: "How was today for you? You know the Concierge is there if you need anything during the week."</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* SKILL-BASED TIPS */}
                <div>
                  <h3 className="text-lg font-bold mb-4 pb-2 border-b-2" style={{ color: COLORS.orange, borderColor: COLORS.orange }}>
                    By Skill
                  </h3>

                  <div className="space-y-8">
                    {/* Communication */}
                    <div>
                      <h4 className="font-bold mb-3" style={{ color: COLORS.slate }}>Communication</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">One thing at a time. Instead of "We'll do cards, then lunch, then the raffle," say: "Let's start with cards." Keep it simple.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Use names. "Margaret, would you like tea?" is warmer and clearer than "Would anyone like tea?" Names anchor attention.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Match your body to your words. A warm smile with a gentle voice says "safe." Rushing words with tense shoulders says "busy."</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">For later-stage dementia, use short sentences, repetition is fine, and let your tone and touch do the communicating.</span>
                        </div>
                      </div>
                    </div>

                    {/* Bridging & Connection */}
                    <div>
                      <h4 className="font-bold mb-3" style={{ color: COLORS.slate }}>Bridging & Connection</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Keep a mental note of shared interests. "Arthur loves cricket, Frank was an engineer." These connections build friendships that outlast the session.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">When introducing people, give them something to talk about: "Margaret, this is Jean — she used to be a nurse too." Don't just say names; give a bridge.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Watch for cliques forming. Mix seating gently each week. "Come sit with us today, John — I'd love you to meet someone."</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Bridge carers to each other. They often stand alone watching their person. "Sarah's husband comes too — let me introduce you."</span>
                        </div>
                      </div>
                    </div>

                    {/* Observation */}
                    <div>
                      <h4 className="font-bold mb-3" style={{ color: COLORS.slate }}>Observation & Noticing</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Notice the good things too, not just concerns. "Harold was really animated today — loved the music." Positive observations matter for the team.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">When sharing concerns, be specific: "Margaret hasn't eaten, she's been quiet, and she winced moving her shoulder." Facts, not diagnosis.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Trust your gut. If something feels off but you can't name it, say so: "Something feels different with John today." Your intuition picks up on subtle cues.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Compare to their baseline. "Margaret is usually chatty" is what makes "Margaret is quiet today" meaningful. Know your Members.</span>
                        </div>
                      </div>
                    </div>

                    {/* Warm Boundaries */}
                    <div>
                      <h4 className="font-bold mb-3" style={{ color: COLORS.slate }}>Holding Warm Boundaries</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Lead with warmth, then hold the limit: "I really enjoy our chats too, Rose. I can't share my number, but I'm here every Thursday."</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Never blame the rules. "I'm not allowed" feels cold. "I care about you, and the best way we stay connected is through Club" feels human.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">If someone is becoming dependent on you, widen their circle gently. Introduce them to other Hosts and Members. This is love, not rejection.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">When asked something beyond your role ("Can you help with my finances?"), redirect with care: "That's a bit beyond what I do, but the Concierge can help."</span>
                        </div>
                      </div>
                    </div>

                    {/* Sensory Engagement */}
                    <div>
                      <h4 className="font-bold mb-3" style={{ color: COLORS.slate }}>Sensory Engagement</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Music from ages 15-25 hits deepest. Ask families what they listened to growing up. A familiar song can reach someone when words can't.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">If words fail, use touch. If touch isn't possible, use presence. There's always a way to connect. A hand held in silence says: you're not alone.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Use smell deliberately. Fresh coffee, lavender, baking — familiar scents trigger memories and comfort. The environment is a tool.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Reduce harsh lighting if you can. Warm, soft light creates calm. Bright overhead lights feel clinical. A few table lamps change everything.</span>
                        </div>
                      </div>
                    </div>

                    {/* Reading the Room */}
                    <div>
                      <h4 className="font-bold mb-3" style={{ color: COLORS.slate }}>Reading the Room</h4>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Do a "room scan" every 15 minutes. Stand back for a moment and look: who's engaged, who's drifting, who looks uncomfortable? This is your radar.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">Energy is contagious. If the room is flat, your energy lifts it. If the room is chaotic, your calm settles it. You set the tone.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">If an activity isn't working, don't wait for it to get worse. Pivot early. "Actually, let's try something different" is always an option.</span>
                        </div>
                        <div className="p-4 rounded-xl border bg-gray-50 flex flex-col" style={{ borderColor: '#e5e7eb' }}>
                          <span className="text-xs font-bold uppercase tracking-wide mb-2 flex-shrink-0 whitespace-nowrap" style={{ color: COLORS.orange }}>Quick tip</span>
                          <span className="text-sm text-gray-700">After Club, share what you noticed in the debrief. "The energy dipped after lunch" or "The music really lifted everyone" — these observations shape next week.</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* DISCOVER TAB */}
          {currentTab === 'discover' && (
            <div className="max-w-4xl mx-auto px-3 sm:px-4 py-6 sm:py-8">
              <div className="bg-white rounded-xl shadow-md p-4 sm:p-8">
                <h2 className="text-3xl font-bold mb-8" style={{ color: COLORS.slate }}>
                  Discover More
                </h2>

                <div className="space-y-8">
                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      About The Good Company People
                    </h3>
                    <p className="text-gray-700 mb-4">
                      The Good Company People is a group of carers, community members, volunteers and people with lived experience of ageing and dementia. We are here because we believe growing older should not mean becoming invisible.
                    </p>
                    <p className="text-gray-700 mb-4">
                      Everything we do is shaped by real life. It started with Lucy and her mum Hazel. Their experience helped create a new kind of support that feels human and familiar. Since then, many others have helped shape what Good Company means.
                    </p>
                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      The Host Role
                    </h3>
                    <p className="text-gray-700 mb-4">
                      A Host is someone who creates Good Company. You're not a therapist, carer, or activity leader. You're a warm, present human being who:
                    </p>
                    <ul className="text-gray-700 space-y-2 mb-4 ml-4">
                      <li>✓ Notices and values people for who they are</li>
                      <li>✓ Creates space for connection and belonging</li>
                      <li>✓ Listens more than you speak</li>
                      <li>✓ Supports others to be themselves</li>
                      <li>✓ Escalates concerns to those trained</li>
                      <li>✓ Shows up consistently</li>
                    </ul>
                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      Core Values
                    </h3>
                    <div className="grid gap-4 md:grid-cols-2">
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Person-Centred</p>
                        <p className="text-sm text-gray-600 mt-1">See the whole person, not just the condition or need.</p>
                      </div>
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Relational</p>
                        <p className="text-sm text-gray-600 mt-1">Presence matters more than perfection.</p>
                      </div>
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Inclusive</p>
                        <p className="text-sm text-gray-600 mt-1">Everyone belongs. No one eats alone.</p>
                      </div>
                      <div className="p-4 bg-orange-50 rounded-lg border-l-4" style={{ borderColor: COLORS.orange }}>
                        <p className="font-bold" style={{ color: COLORS.slate }}>Strengths-Based</p>
                        <p className="text-sm text-gray-600 mt-1">Focus on what people can do, not what they can't.</p>
                      </div>
                    </div>
                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      The Thursday Murder Club Principle
                    </h3>
                    <p className="text-gray-700 italic mb-3">
                      "It's not about the activities. It's about the people. And the people are everything."
                    </p>
                    <p className="text-gray-700">
                      Members come for activities, puzzles, and outings. But they stay for the friendships, the laughter, and the feeling of belonging to something that matters. As a Host, you create that belonging.
                    </p>
                  </div>

                  <div>
                    <h3 className="text-xl font-bold mb-4" style={{ color: COLORS.orange }}>
                      What the Training Covers
                    </h3>
                    <p className="text-gray-700 mb-4">
                      Our one-day training programme covers 10 modules, each designed to build your confidence as a Host:
                    </p>
                    <div className="grid gap-2">
                      {MODULES.map(m => (
                        <div key={m.id} className="flex items-start gap-3 p-3 rounded-lg" style={{ backgroundColor: COLORS.cream }}>
                          <span className="font-bold text-sm mt-0.5" style={{ color: COLORS.orange }}>{m.id}</span>
                          <div>
                            <p className="font-semibold text-sm" style={{ color: COLORS.slate }}>{m.title}</p>
                            <p className="text-xs text-gray-500">{m.subtitle}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <ExpressInterestForm />
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className="bg-white border-t-2 mt-12" style={{ borderColor: COLORS.orange }}>
            <div className="max-w-6xl mx-auto px-4 py-8 text-center text-gray-600 text-sm">
              <p>The Good Company People — Host Training — Making the world a kinder place, one club at a time.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HostTrainingApp));
  </script>
</body>
</html>
